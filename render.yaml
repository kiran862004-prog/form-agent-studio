services:
  - type: web
    name: form-agent-studio
    env: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: FORM_AGENT_USERNAME
        sync: false
      - key: FORM_AGENT_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
